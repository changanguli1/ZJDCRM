name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm approve-scripts esbuild workerd sharp 2>/dev/null || true
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e

